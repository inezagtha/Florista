<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #d91e63 0%, #ec407a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        .form-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            min-height: auto;
        }

        /* Left Side Styling */
        .left-side {
            background: linear-gradient(135deg, #f06292 0%, #ec407a 50%, #d91e63 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .shape {
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(255, 255, 255, 0.1);
            transform: rotate(45deg);
            top: -100px;
            left: -100px;
            border-radius: 20px;
        }

        .shape::after {
            content: '';
            position: absolute;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.15);
            transform: rotate(-45deg);
            top: 30px;
            left: 30px;
            border-radius: 15px;
        }

        .shape-text {
            position: relative;
            z-index: 10;
            text-align: center;
            color: white;
        }

        .shape-text h2 {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .shape-text p {
            font-size: 16px;
            font-weight: 300;
            letter-spacing: 3px;
        }

        /* Right Side Styling */
        .right-side {
            padding: 50px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .form-wrapper {
            width: 100%;
            max-width: 350px;
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #f06292 0%, #ec407a 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 10px 30px rgba(240, 98, 146, 0.3);
        }

        .icon-circle i {
            color: white;
            font-size: 40px;
        }

        h1 {
            text-align: center;
            color: #d91e63;
            font-size: 28px;
            margin-bottom: 30px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            border-bottom: 2px solid #e0e0e0;
            transition: all 0.3s ease;
        }

        .input-wrapper:focus-within {
            border-bottom-color: #ec407a;
        }

        .input-wrapper i {
            color: #999;
            margin-right: 12px;
            font-size: 16px;
        }

        .input-wrapper input {
            flex: 1;
            border: none;
            padding: 15px 0;
            font-size: 14px;
            background: transparent;
            outline: none;
            color: #333;
        }

        .input-wrapper input::placeholder {
            color: #bbb;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0;
        }

        .checkbox {
            display: flex;
            align-items: center;
            font-size: 13px;
            color: #666;
            cursor: pointer;
            user-select: none;
        }

        .checkbox input {
            width: 18px;
            height: 18px;
            margin-right: 8px;
            cursor: pointer;
            accent-color: #ec407a;
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #f06292 0%, #ec407a 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
            letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(240, 98, 146, 0.3);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(240, 98, 146, 0.4);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .divider {
            text-align: center;
            margin: 25px 0;
            position: relative;
            color: #999;
            font-size: 13px;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 50%;
            height: 1px;
            background: #e0e0e0;
        }

        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            right: 0;
            height: 1px;
            background: #e0e0e0;
        }

        .divider span {
            position: relative;
            background: white;
            padding: 0 10px;
        }

        .social-login {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            text-decoration: none;
            color: #666;
            font-weight: 500;
            font-size: 13px;
            transition: all 0.3s ease;
        }

        .social-btn:hover {
            border-color: #ec407a;
            color: #ec407a;
            background: rgba(240, 98, 146, 0.05);
        }

        .social-btn i {
            font-size: 16px;
        }

        .signup-link {
            text-align: center;
            font-size: 13px;
            color: #999;
            margin-top: 20px;
        }

        .signup-link a {
            color: #ec407a;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .signup-link a:hover {
            color: #d91e63;
        }

        /* Success Modal */
        .success-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }

        .success-modal.active {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .success-content {
            background: white;
            border-radius: 20px;
            padding: 60px 40px;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: scaleIn 0.5s ease;
        }

        @keyframes scaleIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .checkmark-circle {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #f06292 0%, #ec407a 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            position: relative;
            box-shadow: 0 10px 40px rgba(240, 98, 146, 0.4);
        }

        .checkmark {
            width: 70px;
            height: 70px;
            position: relative;
        }

        .checkmark::after {
            content: '';
            position: absolute;
            width: 25px;
            height: 14px;
            border: 4px solid white;
            border-top: none;
            border-right: none;
            left: 22px;
            top: 24px;
            transform: rotate(-45deg);
            animation: checkmarkAnimation 0.8s ease 0.3s both;
        }

        @keyframes checkmarkAnimation {
            0% {
                width: 0;
                height: 0;
                border-width: 4px;
                left: 22px;
                top: 24px;
            }
            50% {
                width: 25px;
                height: 0;
                border-width: 4px;
                left: 15px;
                top: 20px;
            }
            100% {
                width: 25px;
                height: 14px;
                border-width: 4px;
                left: 22px;
                top: 24px;
            }
        }

        .success-content h2 {
            color: #d91e63;
            font-size: 26px;
            margin-bottom: 12px;
            font-weight: 700;
        }

        .success-content p {
            color: #666;
            font-size: 15px;
            margin-bottom: 25px;
        }

        .countdown {
            color: #ec407a;
            font-weight: 600;
            font-size: 16px;
            margin-top: 20px;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .form-container {
                grid-template-columns: 1fr;
            }

            .left-side {
                display: none;
            }

            .right-side {
                padding: 40px 25px;
            }

            .form-wrapper {
                max-width: 100%;
            }

            h1 {
                font-size: 24px;
            }

            .icon-circle {
                width: 70px;
                height: 70px;
            }

            .icon-circle i {
                font-size: 35px;
            }

            .social-login {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .right-side {
                padding: 30px 20px;
            }

            h1 {
                font-size: 22px;
                margin-bottom: 20px;
            }

            .input-wrapper input {
                padding: 12px 0;
                font-size: 13px;
            }

            .btn-login {
                padding: 12px;
                font-size: 14px;
            }

            .form-options {
                margin: 15px 0;
            }

            .success-content {
                padding: 40px 25px;
                max-width: 90%;
            }

            .checkmark-circle {
                width: 100px;
                height: 100px;
                margin: 0 auto 20px;
            }

            .checkmark {
                width: 60px;
                height: 60px;
            }

            .checkmark::after {
                width: 20px;
                height: 11px;
                border-width: 3px;
                left: 12px;
                top: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-container">
            <!-- Left Side - Decorative -->
            <div class="left-side">
                <div class="shape"></div>
                <div class="shape-text">
                    <h2>SIGN UP</h2>
                    <p>JOIN US</p>
                </div>
            </div>

            <!-- Right Side - Form -->
            <div class="right-side">
                <div class="form-wrapper">
                    <div class="icon-circle">
                        <i class="fas fa-user-plus"></i>
                    </div>
                    <h1>SIGN UP</h1>

                    <form id="signupForm">
                        <div class="form-group">
                            <div class="input-wrapper">
                                <i class="fas fa-user"></i>
                                <input type="text" placeholder="Full Name" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <div class="input-wrapper">
                                <i class="fas fa-envelope"></i>
                                <input type="email" placeholder="Email" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <div class="input-wrapper">
                                <i class="fas fa-lock"></i>
                                <input type="password" placeholder="Password" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <div class="input-wrapper">
                                <i class="fas fa-lock"></i>
                                <input type="password" placeholder="Confirm Password" required>
                            </div>
                        </div>

                        <div class="form-options">
                            <label class="checkbox">
                                <input type="checkbox" required>
                                <span>I agree to the Terms & Conditions</span>
                            </label>
                        </div>

                        <button type="submit" class="btn-login">SIGN UP</button>
                    </form>

                    <div class="divider">
                        <span>Or Sign Up With</span>
                    </div>

                    <div class="social-login">
                        <a href="#" class="social-btn google">
                            <i class="fab fa-google"></i>
                            <span>Google</span>
                        </a>
                        <a href="#" class="social-btn facebook">
                            <i class="fab fa-facebook-f"></i>
                            <span>Facebook</span>
                        </a>
                    </div>

                    <div class="signup-link">
                        <p>Already have an account? <a href="login.html">Login</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Success Modal -->
    <div class="success-modal" id="successModal">
        <div class="success-content">
            <div class="checkmark-circle">
                <div class="checkmark"></div>
            </div>
            <h2>Sign Up Successful!</h2>
            <p>Your account has been created successfully.</p>
            <div class="countdown">
                Redirecting to Login in <span id="countdown">3</span>s...
            </div>
        </div>
    </div>

    <script>
        // Sign Up Form Handler
        const signupForm = document.getElementById('signupForm');
        if (signupForm) {
            signupForm.addEventListener('submit', function(e) {
                e.preventDefault();
                
                const fullName = this.querySelector('input[type="text"]').value;
                const email = this.querySelectorAll('input[type="email"]')[0].value;
                const password = this.querySelectorAll('input[type="password"]')[0].value;
                const confirmPassword = this.querySelectorAll('input[type="password"]')[1].value;
                const terms = this.querySelector('input[type="checkbox"]').checked;
                
                // Validasi
                if (!fullName || !email || !password || !confirmPassword) {
                    alert('Semua field harus diisi!');
                    return;
                }
                
                if (password !== confirmPassword) {
                    alert('Password tidak cocok!');
                    return;
                }
                
                if (!terms) {
                    alert('Anda harus menyetujui Terms & Conditions!');
                    return;
                }
                
                // Show success modal
                showSuccessModal();
            });
        }

        function showSuccessModal() {
            const modal = document.getElementById('successModal');
            const countdownEl = document.getElementById('countdown');
            let count = 3;

            modal.classList.add('active');

            const interval = setInterval(() => {
                count--;
                countdownEl.textContent = count;

                if (count === 0) {
                    clearInterval(interval);
                    window.location.href = 'login.html';
                }
            }, 1000);
        }

        // Social Sign Up Handlers
        const socialButtons = document.querySelectorAll('.social-btn');
        socialButtons.forEach(button => {
            button.addEventListener('click', function(e) {
                e.preventDefault();
                const provider = this.classList.contains('google') ? 'Google' : 'Facebook';
                console.log('Social signup with:', provider);
                alert('Redirecting to ' + provider + ' authentication... (Demo)');
            });
        });

        // Input focus animation
        const inputs = document.querySelectorAll('.input-wrapper input');
        inputs.forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.style.borderBottomColor = '#ec407a';
            });  
            
            input.addEventListener('blur', function() {
                if (!this.value) {
                    this.parentElement.style.borderBottomColor = '#e0e0e0';
                }
            });
        });
    </script>
</body>
</html>
